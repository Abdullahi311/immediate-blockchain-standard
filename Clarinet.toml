[project]
name = "immediate-blockchain-standard"
authors = ["Blockchain Solutions Team"]
description = "A decentralized platform for transparent and verifiable asset tracking"
telemetry = false
requirements = []
[contracts.core-asset-registry]
path = "contracts/core-asset-registry.clar"
depends_on = []

[contracts.participant-management]
path = "contracts/participant-management.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
